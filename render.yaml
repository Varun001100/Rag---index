services:
  - type: web
    name: multi-doc-rag
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_PATH
        value: /data/rag.db
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: PINECONE_API_KEY
        sync: true
      - key: PINECONE_INDEX_NAME
        sync: true
      - key: GEMINI_API_KEY
        sync: true
    disk:
      name: rag-data
      mountPath: /data
      sizeGB: 1
